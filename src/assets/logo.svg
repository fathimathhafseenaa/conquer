<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Abstract C shape representing Conquer -->
  <path d="M 45 15 A 28 28 0 1 0 45 65 A 21 21 0 1 1 45 15" 
        fill="none" 
        stroke="url(#logoGradient)" 
        stroke-width="6"
        stroke-linecap="round"/>
  
  <!-- Crown symbol above the C -->
  <path d="M 30 5 L 38 20 L 45 10 L 52 20 L 60 5" 
        fill="none" 
        stroke="url(#logoGradient)" 
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Text: CONQUER -->
  <text x="85" y="52" 
        font-family="Inter, Arial, sans-serif" 
        font-size="42" 
        font-weight="900" 
        fill="url(#logoGradient)"
        letter-spacing="3">
    Conquer
  </text>
</svg>
